<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sach.in | 3D Cosmic Car Driving</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="grain-overlay"></div>
    <div id="loading-screen">
        <div class="loader">
            <div class="circle"></div>
            <div class="text">INITIALIZING QUANTUM DRIVE...</div>
        </div>
    </div>

    <div id="intro-screen">
        <div class="intro-content">
            <h1 class="glitch" data-text="Sach.in">Sach.in</h1>
            <p class="subtitle">COSMIC HIGHWAY SYSTEM</p>
            <button id="start-btn">ENTER WORMHOLE</button>
            <div class="intro-credits">
                <a href="https://www.instagram.com/sachinpatil12n/" target="_blank">@sachinpatil12n</a>
            </div>
        </div>
    </div>

    <div id="hud">
        <div class="top-left">
                <span id="score">000000</span>
            </div>
            <div id="paradox-indicator" class="hud-box hidden">
                <span class="label">PARADOX</span>
                <div class="paradox-bar">
                    <div id="paradox-fill"></div>
                </div>
            </div>
            <div id="momentum-container" class="hud-box">
                <span class="label">MOMENTUM</span>
                <div class="momentum-bar">
                    <div id="momentum-fill"></div>
                </div>
            </div>
        </div>
        <div class="top-right">
            <div id="timer-container" class="hidden">
                <span class="label">TIME</span>
                <span id="timer-value">00:00</span>
            </div>
            <div class="mode-indicator" id="game-mode">FREE DRIVE</div>
        </div>
        <div class="bottom-center">
            <div class="speedometer">
                <div class="speed-value" id="speed">0</div>
                <div class="speed-unit">LY/S</div>
                <div class="boost-bar-container">
                    <div id="boost-bar" class="boost-bar-fill"></div>
                </div>
            </div>
        </div>
        <div id="navigation-map">
            <canvas id="radar-canvas"></canvas>
        </div>
        <div id="delta-timer" class="hidden">0.000s</div>
    </div>

    <div id="menu-overlay" class="hidden">
        <div class="menu-card">
            <h2>GALAXY TERMINAL</h2>
            <div class="menu-options">
                <button class="menu-btn" data-mode="free">FREE DRIVE</button>
                <button class="menu-btn" data-mode="race">GALAXY RACE</button>
                <button class="menu-btn" data-mode="survival">ASTEROID SURVIVAL</button>
                <button class="menu-btn" data-mode="time">TIME WARP</button>
            </div>
            <div class="credits">
                <p>Created by Sachin Patil</p>
                <a href="https://www.instagram.com/sachinpatil12n/" target="_blank">Instagram</a>
            </div>
        </div>
    </div>

    <canvas id="game-canvas"></canvas>

    <script src="game.js"></script>
</body>
</html>
